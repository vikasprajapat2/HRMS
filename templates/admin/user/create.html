{% extends "base.html" %}
{% block title %}Create User - EMS{% endblock %}
{% block content %}
<div class="container-fluid animate-fade-in">
    <div class="row mb-4 align-items-center">
        <div class="col-md-6">
            <h2 class="fw-bold text-dark mb-1"><i class="fas fa-user-plus text-primary me-2"></i>Create User</h2>
            <p class="text-secondary mb-0">Manually add a new system user account.</p>
        </div>
        <div class="col-md-6 text-md-end mt-3 mt-md-0">
            <a href="{{ url_for('user.index') }}" class="btn btn-white border shadow-sm">
                <i class="fas fa-arrow-left me-2"></i>Back to List
            </a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-md-5">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label text-muted x-small fw-bold text-uppercase">Full Name</label>
                            <input type="text" name="name" class="form-control form-control-lg bg-light border-0" required placeholder="Enter full name">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted x-small fw-bold text-uppercase">Email Address</label>
                            <input type="email" name="email" class="form-control form-control-lg bg-light border-0" required placeholder="Enter email address">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted x-small fw-bold text-uppercase">Password</label>
                            <input type="password" name="password" class="form-control form-control-lg bg-light border-0" required minlength="6" placeholder="At least 6 characters">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted x-small fw-bold text-uppercase">System Role</label>
                            <select name="role_id" class="form-select form-select-lg bg-light border-0" required>
                                <option value="">Select a role</option>
                                {% for role in roles %}
                                <option value="{{ role.id }}">{{ role.name|title }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">
                                <i class="fas fa-check-circle me-2"></i>Create Account
                            </button>
                            <a href="{{ url_for('user.index') }}" class="btn btn-link text-secondary text-decoration-none small">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
