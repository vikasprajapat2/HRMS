{% extends "base.html" %}
{% block title %}Edit User - EMS{% endblock %}
{% block content %}
<div class="container-fluid animate-fade-in">
    <div class="row mb-4 align-items-center">
        <div class="col-md-6">
            <h2 class="fw-bold text-dark mb-1"><i class="fas fa-user-edit text-primary me-2"></i>Edit User</h2>
            <p class="text-secondary mb-0">Update system account details for {{ user.name }}.</p>
        </div>
        <div class="col-md-6 text-md-end mt-3 mt-md-0">
            <a href="{{ url_for('user.index') }}" class="btn btn-white border shadow-sm">
                <i class="fas fa-arrow-left me-2"></i>Back to List
            </a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-md-5">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label text-muted x-small fw-bold text-uppercase">Full Name</label>
                            <input type="text" name="name" class="form-control form-control-lg bg-light border-0" value="{{ user.name }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted x-small fw-bold text-uppercase">Email Address</label>
                            <input type="email" name="email" class="form-control form-control-lg bg-light border-0" value="{{ user.email }}" required readonly title="Email cannot be changed">
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted x-small fw-bold text-uppercase">System Role</label>
                                <select name="role_id" class="form-select bg-light border-0" required>
                                    {% for role in roles %}
                                    <option value="{{ role.id }}" {% if user.role_id == role.id %}selected{% endif %}>{{ role.name|title }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted x-small fw-bold text-uppercase">Account Status</label>
                                <select name="status" class="form-select bg-light border-0" required>
                                    <option value="active" {% if user.status == 'active' %}selected{% endif %}>Active</option>
                                    <option value="inactive" {% if user.status == 'inactive' %}selected{% endif %}>Inactive</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted x-small fw-bold text-uppercase">New Password (Leave blank to keep current)</label>
                            <input type="password" name="password" class="form-control bg-light border-0" placeholder="Minimum 6 characters">
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">
                                <i class="fas fa-save me-2"></i>Save Changes
                            </button>
                            <a href="{{ url_for('user.index') }}" class="btn btn-link text-secondary text-decoration-none small">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
