{% extends 'base.html' %}
{% block title %}Change Password - EMS{% endblock %}
{% block content %}
<div class="container-fluid animate-fade-in">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm mt-5">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
                            <i class="fas fa-lock fa-2x"></i>
                        </div>
                        <h3 class="fw-bold text-dark">Change Password</h3>
                        <p class="text-secondary small">Update your account security settings.</p>
                    </div>

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label text-muted x-small fw-bold text-uppercase">Old Password</label>
                            <input type="password" name="old_password" class="form-control form-control-lg bg-light border-0" required placeholder="Enter old password">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted x-small fw-bold text-uppercase">New Password</label>
                            <input type="password" name="new_password" class="form-control form-control-lg bg-light border-0" required minlength="6" placeholder="At least 6 characters">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted x-small fw-bold text-uppercase">Confirm New Password</label>
                            <input type="password" name="confirm_password" class="form-control form-control-lg bg-light border-0" required minlength="6" placeholder="Confirm new password">
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">
                                <i class="fas fa-save me-2"></i>Update Password
                            </button>
                            <a href="{{ url_for('user.profile') }}" class="btn btn-link text-secondary text-decoration-none small">
                                <i class="fas fa-times me-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
