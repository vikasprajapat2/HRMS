{% extends "base.html" %}
{% block title %}{{ 'Edit' if holiday else 'Add' }} Holiday{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow mt-4">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-calendar-plus me-2"></i>{{ 'Edit' if holiday else 'Add' }} Holiday</h4>
            </div>
            <div class="card-body">
                <form method="post" action="{{ url_for('attendance.edit_holiday', holiday_id=holiday.id) if holiday else url_for('attendance.create_holiday') }}">
                    <div class="mb-3">
                        <label for="name" class="form-label">Holiday Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ holiday.name if holiday else '' }}" required placeholder="e.g. Christmas Day">
                    </div>

                    <div class="mb-3">
                        <label for="date" class="form-label">Date <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-calendar-day"></i></span>
                            <input type="date" class="form-control" id="date" name="date" value="{{ holiday.date if holiday else '' }}" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="type" class="form-label">Type <span class="text-danger">*</span></label>
                            <select class="form-select" id="type" name="type" required>
                                <option value="government" {% if holiday and holiday.type == 'government' %}selected{% endif %}>Government Holiday</option>
                                <option value="company" {% if holiday and holiday.type == 'company' %}selected{% endif %}>Company Holiday</option>
                                <option value="other" {% if holiday and holiday.type == 'other' %}selected{% endif %}>Other</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="is_paid" class="form-label">Paid Holiday?</label>
                            <select class="form-select" id="is_paid" name="is_paid">
                                <option value="true" {% if not holiday or holiday.is_paid %}selected{% endif %}>Yes</option>
                                <option value="false" {% if holiday and not holiday.is_paid %}selected{% endif %}>No</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3" placeholder="Additional details...">{{ holiday.description if holiday else '' }}</textarea>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('attendance.holidays') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-success"><i class="fas fa-save me-1"></i> Save Holiday</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
