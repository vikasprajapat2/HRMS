{% extends "base.html" %}
{% block title %}Create Schedule{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow mt-4">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Create New Schedule</h4>
            </div>
            <div class="card-body">
                <form action="{{ url_for('schedule.create') }}" method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Schedule Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" required placeholder="e.g. Morning Shift">
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="is_flexible" name="is_flexible">
                        <label class="form-check-label" for="is_flexible">Is Flexible Shift?</label>
                    </div>

                    <div id="fixed_time_container">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="time_in" class="form-label">Time In <span class="text-danger">*</span></label>
                                <input type="time" class="form-control" id="time_in" name="time_in" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="time_out" class="form-label">Time Out <span class="text-danger">*</span></label>
                                <input type="time" class="form-control" id="time_out" name="time_out" required>
                            </div>
                        </div>
                    </div>

                    <div id="flexible_time_container" style="display: none;">
                        <div class="mb-3">
                            <label for="working_hours" class="form-label">Required Working Hours</label>
                            <input type="number" step="0.1" class="form-control" id="working_hours" name="working_hours" value="8.0">
                            <small class="text-muted">Total hours required per day (e.g. 8.5)</small>
                        </div>
                    </div>

                    <div class="mb-3" id="grace_period_container">
                        <label for="grace_period_minutes" class="form-label">Grace Period (Minutes)</label>
                        <input type="number" class="form-control" id="grace_period_minutes" name="grace_period_minutes" value="0">
                        <small class="text-muted">Allowed delay before marked as Late</small>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a href="{{ url_for('schedule.index') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-success"><i class="fas fa-save me-1"></i> Save Schedule</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const flexibleCheckbox = document.getElementById('is_flexible');
        const fixedTimeContainer = document.getElementById('fixed_time_container');
        const flexibleTimeContainer = document.getElementById('flexible_time_container');
        const gracePeriodContainer = document.getElementById('grace_period_container');
        const timeIn = document.getElementById('time_in');
        const timeOut = document.getElementById('time_out');

        function toggleFields() {
            if (flexibleCheckbox.checked) {
                fixedTimeContainer.style.display = 'none';
                flexibleTimeContainer.style.display = 'block';
                gracePeriodContainer.style.display = 'none';
                timeIn.removeAttribute('required');
                timeOut.removeAttribute('required');
            } else {
                fixedTimeContainer.style.display = 'block';
                flexibleTimeContainer.style.display = 'none';
                gracePeriodContainer.style.display = 'block';
                timeIn.setAttribute('required', 'required');
                timeOut.setAttribute('required', 'required');
            }
        }

        flexibleCheckbox.addEventListener('change', toggleFields);
        toggleFields();
    });
</script>
{% endblock %}
