{% extends "base.html" %}
{% block title %}Edit Schedule{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow mt-4">
            <div class="card-header bg-info text-white">
                <h4 class="mb-0">Edit Schedule</h4>
            </div>
            <div class="card-body">
                <form action="{{ url_for('schedule.edit', id=schedule.id) }}" method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Schedule Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ schedule.name }}" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="time_in" class="form-label">Time In <span class="text-danger">*</span></label>
                            <input type="time" class="form-control" id="time_in" name="time_in" value="{{ schedule.time_in.strftime('%H:%M') }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="time_out" class="form-label">Time Out <span class="text-danger">*</span></label>
                            <input type="time" class="form-control" id="time_out" name="time_out" value="{{ schedule.time_out.strftime('%H:%M') }}" required>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{{ url_for('schedule.index') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-success"><i class="fas fa-save me-1"></i> Update Schedule</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
