{% extends "base.html" %}
{% block title %}Edit Leave Type{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow mt-4">
            <div class="card-header bg-info text-white">
                <h4 class="mb-0">Edit Leave Type</h4>
            </div>
            <div class="card-body">
                <form action="{{ url_for('leave_type.edit', id=leave_type.id) }}" method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Type Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" required value="{{ leave_type.name }}">
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <input type="text" class="form-control" id="description" name="description" value="{{ leave_type.description or '' }}">
                    </div>
                    <div class="mb-4">
                        <label for="days_allowed" class="form-label">Max Days Allowed per Year</label>
                        <input type="number" class="form-control" id="days_allowed" name="days_allowed" min="0" value="{{ leave_type.days_allowed }}">
                        <div class="form-text">Leave as 0 for unlimited / no maximum.</div>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('leave_type.index') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-info text-white"><i class="fas fa-save me-1"></i> Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
