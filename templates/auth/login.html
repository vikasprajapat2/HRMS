<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartHR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f7f7f7;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .account-box {
            background-color: #fff;
            border: 1px solid #e3e3e3;
            border-radius: 4px;
            box-shadow: 0 1px 1px 0 rgba(0, 0, 0, 0.2);
            margin: 0 auto;
            width: 480px;
            padding: 30px;
        }
        .account-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .account-logo i {
            font-size: 50px;
            color: #ff9b44;
        }
        .account-logo span {
            display: block;
            font-size: 24px;
            font-weight: 700;
            color: #ff9b44;
            margin-top: 10px;
        }
        .account-title {
            font-size: 26px;
            font-weight: 500;
            margin-bottom: 5px;
            text-align: center;
        }
        .account-subtitle {
            color: #888;
            font-size: 18px;
            margin-bottom: 30px;
            text-align: center;
        }
        .form-label {
            font-weight: 500;
            color: #1f1f1f;
        }
        .form-control {
            border: 1px solid #e3e3e3;
            border-radius: 4px;
            padding: 10px 15px;
        }
        .btn-primary {
            background-color: #ff9b44;
            border-color: #ff9b44;
            font-weight: 600;
            padding: 10px;
            font-size: 18px;
        }
        .btn-primary:hover {
            background-color: #fc8d28;
            border-color: #fc8d28;
        }
        .forgot-password {
            float: right;
            color: #1f1f1f;
            font-size: 14px;
        }
        .account-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 15px;
        }
        .account-footer a {
            color: #ff9b44;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="account-box shadow-sm">
            <div class="account-logo">
                <i class="fas fa-rocket"></i>
                <span>SmartHR</span>
            </div>
            
            <div class="account-title">Login</div>
            <p class="account-subtitle">Access to our dashboard</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="mb-4">
                    <label for="email" class="form-label">Employee ID / Email</label>
                    <input type="text" class="form-control" id="email" name="email" required placeholder="Enter your ID or Email">
                </div>
                
                <div class="mb-4">
                    <div class="row">
                        <div class="col">
                            <label for="password" class="form-label">Password</label>
                        </div>
                        <div class="col-auto">
                            <a class="forgot-password" href="{{ url_for('auth.forgot_password') }}">Forgot password?</a>
                        </div>
                    </div>
                    <input type="password" class="form-control" id="password" name="password" required placeholder="Enter your password">
                </div>
                
                <div class="mb-4">
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </div>
                
                <div class="account-footer">
                    <p>Don't have an account yet? <a href="{{ url_for('auth.register') }}">Register</a></p>
                    <a href="{{ url_for('index') }}" class="text-muted small"><i class="fas fa-home me-1"></i> Back to Home</a>
                </div>
            </form>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
